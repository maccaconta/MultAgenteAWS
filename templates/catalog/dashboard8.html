{% extends "base.html" %}
{% block title %}Dashboard | Treinamento de Propagandistas{% endblock %}

{% block content %}
<section class="persona-experience">
  <div class="persona-grid">
    {% for persona in personas %}
    <article class="persona-card">
      <div class="persona-avatar">
        <img src="{% static 'admin/img/background/persona' %}{{ forloop.counter }}.png" alt="{{ persona.title }}">
      </div>

      <div class="persona-label">{{ persona.title }}</div>

      <form method="post" action="{% url 'launch-simulation' %}" class="persona-form">
        {% csrf_token %}
        <input type="hidden" name="persona" value="{{ persona.id }}">

        <div class="field">
          <label>Especialidade</label>
          <select name="specialty" required>
            <option value="">Selecione</option>
            {% for specialty in specialties %}
              <option value="{{ specialty.id }}">{{ specialty.title }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="field">
          <label>Cenário</label>
          <select name="scenario" required>
            <option value="">Selecione</option>
            {% for scenario in scenarios %}
              <option value="{{ scenario.id }}">{{ scenario.title }}</option>
            {% endfor %}
          </select>
        </div>

        <button type="submit">Abrir conversa</button>
      </form>
    </article>
    {% endfor %}
  </div>
</section>

<style>
.persona-experience {
  max-width: 1280px;
  margin: 0 auto;
}

.persona-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
}

.persona-card {
  width: 240px;
  flex: 0 0 240px;
  padding: 18px;
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(10,20,42,.9), rgba(8,14,30,.95));
  border: 1px solid rgba(121,215,255,.2);
  box-shadow: 0 18px 42px rgba(0,0,0,.3);
}

.persona-avatar {
  height: 140px;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 12px;
}

.persona-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.persona-label {
  font-size: 17px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 12px;
}

.persona-form {
  display: grid;
  gap: 10px;
}

.persona-form select {
  padding: 10px;
  border-radius: 10px;
}

.persona-form button {
  margin-top: 6px;
}

@media (max-width: 800px) {
  .persona-card {
    width: 200px;
    flex-basis: 200px;
  }
}
</style>
{% endblock %}
